<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ukulele Tuner</title>
  <script src="https://cdn.jsdelivr.net/npm/tone@14/build/Tone.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      padding: 8px 12px;
      gap: 6px;
    }

    /* ── Reference string buttons ── */
    #ref-buttons {
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    .ref-btn {
      width: 44px;
      height: 34px;
      border-radius: 10px;
      border: 2px solid transparent;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      transition: transform 0.1s, border-color 0.15s, box-shadow 0.15s;
    }

    .ref-btn.selected {
      border-color: white;
      transform: scale(1.08);
      box-shadow: 0 0 12px rgba(255,255,255,0.3);
    }

    .ref-btn.str-disabled { opacity: 0.28; cursor: default; }

    /* ── Main area: SVG + string toggles ── */
    #main-area {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      justify-content: center;
    }

    #uke-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: visible;
      padding-top: 30px; /* room for rotated SVG overflow above */
    }

    #uke-svg {
      width: 300px;
      height: 390px;
      flex-shrink: 0;
      touch-action: none;
      -webkit-touch-callout: none;
      transform: rotate(15deg);
      transform-origin: center center;
      overflow: visible;
    }

    /* ── Options panel (left side) ── */
    #options-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .option-btn {
      width: 72px;
      padding: 7px 4px;
      border-radius: 10px;
      border: 2px solid transparent;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: rgba(255,255,255,0.1);
      transition: all 0.15s;
      line-height: 1.3;
      text-align: center;
    }
    .option-btn:active { transform: scale(0.96); }
    .option-btn.on {
      border-color: rgba(255,255,255,0.6);
      background: rgba(251,191,36,0.25);
      color: #fbbf24;
    }

    /* ── String toggle buttons (right panel) ── */
    #str-toggles {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .str-toggle {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 2px solid transparent;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      color: white;
      background: rgba(255,255,255,0.1);
      transition: all 0.15s;
    }

    .str-toggle.active  { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.18); }
    .str-toggle.inactive { opacity: 0.28; background: rgba(255,255,255,0.04); }

    /* ── Action button row ── */
    #action-row {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
      justify-content: center;
    }

    .action-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: none;
      color: white;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.15s;
      flex-shrink: 0;
    }
    .action-btn:active   { transform: scale(0.96); }
    .action-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    #set-intune-btn  { background: linear-gradient(135deg, #0891b2, #06b6d4); }
    #autotune-btn    { background: linear-gradient(135deg, #b45309, #f59e0b); }
    #check-btn       { background: linear-gradient(135deg, #6d28d9, #a855f7); }

    /* ── Results ── */
    #results {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      min-height: 52px;
      flex-shrink: 0;
      width: 100%;
    }

    .result-row  { display: flex; align-items: center; gap: 10px; justify-content: center; }

    .result-pill {
      padding: 5px 16px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 15px;
      color: white;
      min-width: 90px;
      text-align: center;
    }

    .tune-up-warn { font-size: 12px; color: #fbbf24; font-style: italic; }

    #tone-error {
      display: none;
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #7f1d1d;
      color: #fca5a5;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
    }

    #snap-msg {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #7f1d1d;
      color: #fef2f2;
      border: 2px solid #ef4444;
      border-radius: 14px;
      padding: 14px 22px;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      line-height: 1.4;
      z-index: 100;
      pointer-events: none;
      animation: snapPop 0.25s ease-out;
    }
    @keyframes snapPop {
      from { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
      to   { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="ref-buttons"></div>
  <div id="main-area">
    <div id="options-panel">
      <button id="regen-btn"         class="option-btn">Regenerate Tuning</button>
      <button id="disable-sharp-btn" class="option-btn">Disable Sharp</button>
    </div>
    <div id="uke-wrap">
      <svg id="uke-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div id="str-toggles"></div>
  </div>
  <div id="action-row">
    <button id="set-intune-btn"  class="action-btn">Set to In-Tune</button>
    <button id="autotune-btn"    class="action-btn">Auto-Tune Demo</button>
    <button id="check-btn"       class="action-btn">Check Intonation</button>
  </div>
  <div id="results"></div>
</div>
<div id="tone-error">⚠ Audio unavailable — check internet connection</div>
<div id="snap-msg">🎸 You snapped a string!<br><span style="font-size:13px;font-weight:500">Make sure you are listening.</span></div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════
// STRING DEFINITIONS
// ══════════════════════════════════════════════════════════════

const STRINGS = [
  { name: 'G', freq: 392.00, color: '#f87171', thickness: 2.2 },
  { name: 'C', freq: 261.63, color: '#fb923c', thickness: 3.2 },
  { name: 'E', freq: 329.63, color: '#4ade80', thickness: 2.5 },
  { name: 'A', freq: 440.00, color: '#60a5fa', thickness: 2.0 },
];

// ══════════════════════════════════════════════════════════════
// SVG LAYOUT CONSTANTS
// ══════════════════════════════════════════════════════════════

const VW = 200, VH = 260;
const CX = VW / 2; // 100

const HEAD_X = 58, HEAD_Y = 13,  HEAD_W = 85, HEAD_H = 78;
const NUT_Y  = HEAD_Y + HEAD_H;   // 91
const NECK_X = CX - 24;           // 76
const NECK_W = 48;
const NECK_BOT = 250;

const STR_X = [
  NECK_X + NECK_W * 0.18,  // G ≈ 85
  NECK_X + NECK_W * 0.39,  // C ≈ 95
  NECK_X + NECK_W * 0.61,  // E ≈ 105
  NECK_X + NECK_W * 0.82,  // A ≈ 115
];

const PEG_R = 12; // tuning peg cap radius

// G lower-left, C upper-left — matches real instrument layout
const PEG_POS = [
  { x: HEAD_X - 35, y: HEAD_Y + 55, side: 'left'  }, // G
  { x: HEAD_X - 35, y: HEAD_Y + 20, side: 'left'  }, // C
  { x: HEAD_X + HEAD_W + 35, y: HEAD_Y + 20, side: 'right' }, // E
  { x: HEAD_X + HEAD_W + 35, y: HEAD_Y + 55, side: 'right' }, // A
];

const FRET_RATIOS = [0, 0.0561, 0.1091, 0.1591, 0.2063, 0.2508,
                     0.2929, 0.3325, 0.3699, 0.4052, 0.4384, 0.4697];
const DOT_FRETS = [4, 6, 9];

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════

let selectedIdx  = 0;
let lastResult   = null;
let checking     = false;
let demoRunning  = false;
let disableSharp = false;

function freshStates() {
  return STRINGS.map(() => ({
    enabled:    true,
    offset:     randomOffset(),
    lastAction: null,
    snapped:    false,
  }));
}

let states = freshStates();

function randomOffset() {
  const flat = () => -(Math.floor(Math.random() * 189) + 12);
  if (disableSharp) return flat();
  const sharp = () => Math.floor(Math.random() * 89) + 12;
  return Math.random() < 0.7 ? flat() : sharp();
}

function centsToFreq(base, cents) {
  return base * Math.pow(2, cents / 1200);
}

// ── Peg turning ────────────────────────────────────────────
const pegTurn = { active: false, overlayOpen: false, idx: -1, pointerId: null, lastAngle: null };
const longPressTimers  = {};
const longPressOrigins = {};
const TRACK_R       = 45;
const CENTS_PER_DEG = 100 / 360; // one semitone per full revolution

// ── String animation ───────────────────────────────────────
const stringAnimFrames = {};

// ══════════════════════════════════════════════════════════════
// AUDIO  (Tone.js)
// ══════════════════════════════════════════════════════════════

let playerSynth = null;
let refSynth    = null;
let reverb      = null;
let soundingIdx = -1;
let releaseTimer = null;

async function initAudio() {
  if (playerSynth) return;
  if (typeof Tone === 'undefined') {
    document.getElementById('tone-error').style.display = 'block';
    return;
  }
  await Tone.start(); // wait for AudioContext to move from 'suspended' → 'running'
  reverb = new Tone.Reverb({ decay: 1.3, wet: 0.16 }).toDestination();
  playerSynth = new Tone.Synth({
    oscillator: { type: 'triangle8' },
    envelope:   { attack: 0.005, decay: 0.55, sustain: 0.07, release: 2.8 },
    volume: -4,
  }).connect(reverb);
  refSynth = new Tone.PluckSynth({
    attackNoise: 1.0, dampening: 3600, resonance: 0.97, volume: -2,
  }).connect(reverb);
}

function touchString(idx) {
  initAudio();
  if (!playerSynth) return;

  const freq = centsToFreq(STRINGS[idx].freq, states[idx].offset);
  stopPlayerNote();
  playerSynth.triggerAttack(freq);
  soundingIdx  = idx;
  releaseTimer = setTimeout(stopPlayerNote, 2500);

  animateStringPluck(idx);
}

function stopPlayerNote() {
  if (releaseTimer) { clearTimeout(releaseTimer); releaseTimer = null; }
  if (soundingIdx >= 0 && playerSynth) {
    try { playerSynth.triggerRelease(); } catch (_) {}
    soundingIdx = -1;
  }
}

function playRef(idx) {
  initAudio();
  if (!refSynth) return;
  refSynth.triggerAttackRelease(STRINGS[idx].freq, '2n');
}

async function playAllRef() {
  for (let i = 0; i < 4; i++) {
    if (!states[i].enabled) continue;
    playRef(i);
    await sleep(650);
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

// ══════════════════════════════════════════════════════════════
// STRING VIBRATION ANIMATION
// ══════════════════════════════════════════════════════════════

function animateStringPluck(idx) {
  if (stringAnimFrames[idx]) cancelAnimationFrame(stringAnimFrames[idx]);

  const x    = STR_X[idx];
  const midY = (NUT_Y + NECK_BOT) / 2;
  const start = performance.now();
  const dur   = 1800;  // ms total
  const maxA  = 4;     // max lateral displacement in SVG units

  function frame(now) {
    const t   = Math.min((now - start) / dur, 1);
    const amp = maxA * Math.pow(1 - t, 1.8);
    // ~11 oscillation cycles over the duration
    const w   = amp * Math.sin(t * Math.PI * 22);
    visStr[idx].setAttribute('d',
      `M ${x} ${NUT_Y} Q ${x + w} ${midY} ${x} ${NECK_BOT}`
    );
    if (t < 1) {
      stringAnimFrames[idx] = requestAnimationFrame(frame);
    } else {
      visStr[idx].setAttribute('d', `M ${x} ${NUT_Y} L ${x} ${NECK_BOT}`);
      delete stringAnimFrames[idx];
    }
  }

  stringAnimFrames[idx] = requestAnimationFrame(frame);
}

let snapMsgTimer = null;

function snapString(idx) {
  const s = states[idx];
  s.snapped = true;
  deactivatePegTurn();
  stopPlayerNote();

  // Wild snap animation — string flies apart
  const x = STR_X[idx];
  const midY = (NUT_Y + NECK_BOT) / 2;
  if (stringAnimFrames[idx]) cancelAnimationFrame(stringAnimFrames[idx]);
  const start = performance.now();
  const dur = 400;
  function snapFrame(now) {
    const t = Math.min((now - start) / dur, 1);
    const amp = 18 * t;
    visStr[idx].setAttribute('d',
      `M ${x} ${NUT_Y} Q ${x + amp} ${midY - amp * 2} ${x} ${NECK_BOT}`);
    if (t < 1) {
      stringAnimFrames[idx] = requestAnimationFrame(snapFrame);
    } else {
      visStr[idx].setAttribute('opacity', '0'); // string disappears
      delete stringAnimFrames[idx];
    }
  }
  stringAnimFrames[idx] = requestAnimationFrame(snapFrame);

  // Show message
  const msg = document.getElementById('snap-msg');
  if (snapMsgTimer) clearTimeout(snapMsgTimer);
  msg.style.display = 'block';

  // After 2s: re-string at +100 cents (half step too high), hide message
  snapMsgTimer = setTimeout(() => {
    msg.style.display = 'none';
    s.snapped    = false;
    s.offset     = 100;
    s.lastAction = null;
    visStr[idx].setAttribute('d', `M ${x} ${NUT_Y} L ${x} ${NECK_BOT}`);
    visStr[idx].setAttribute('opacity', '1');
    applyPegAngles();
    applyStringVisuals();
    snapMsgTimer = null;
  }, 2000);
}

// ══════════════════════════════════════════════════════════════
// SVG CONSTRUCTION
// ══════════════════════════════════════════════════════════════

const NS  = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('uke-svg');

let pegGroups    = [];
let visStr       = [];
let trackGroup      = null;
let trackArcUp      = null;
let trackArcDown    = null;
let trackThumb      = null;
let trackLabelUp    = null;
let trackLabelDown  = null;
let trackArrowGroup = null;
let trackArrows     = []; // the 3 arrow polygon elements
let arrowAnimFrame  = null;
let arrowAngle      = 0;
let arrowDir        = 1; // +1 = CW (right peg), -1 = CCW (left peg)

function mkEl(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}

function buildSVG() {
  svg.innerHTML = '';
  svg.setAttribute('viewBox', `0 0 ${VW} ${VH}`);
  pegGroups = []; visStr = [];

  const neckH = NECK_BOT - NUT_Y;

  // ── Neck ───────────────────────────────────────────────
  mkEl('rect', { x: NECK_X, y: NUT_Y, width: NECK_W, height: neckH,
                 fill: '#7c4f1e', rx: 3 }, svg);
  mkEl('rect', { x: NECK_X,              y: NUT_Y, width: 6, height: neckH,
                 fill: 'rgba(0,0,0,0.22)', rx: 2 }, svg);
  mkEl('rect', { x: NECK_X + NECK_W - 6, y: NUT_Y, width: 6, height: neckH,
                 fill: 'rgba(0,0,0,0.22)', rx: 2 }, svg);

  // ── Frets ──────────────────────────────────────────────
  FRET_RATIOS.forEach((r, i) => {
    const y = NUT_Y + r * neckH;
    mkEl('line', { x1: NECK_X - 2, y1: y, x2: NECK_X + NECK_W + 2, y2: y,
                   stroke: i === 0 ? '#e8d5a0' : '#bbb',
                   'stroke-width': i === 0 ? 6 : 1.8 }, svg);
  });
  DOT_FRETS.forEach(fi => {
    const y = NUT_Y + FRET_RATIOS[fi] * neckH;
    mkEl('circle', { cx: CX, cy: y + 16, r: 6, fill: '#c8893a', opacity: 0.75 }, svg);
  });

  // ── Strings (path elements enable vibration animation) ──
  STRINGS.forEach((s, i) => {
    const x = STR_X[i];
    const path = mkEl('path', {
      d: `M ${x} ${NUT_Y} L ${x} ${NECK_BOT}`,
      stroke: s.color, 'stroke-width': s.thickness,
      'stroke-linecap': 'round', fill: 'none',
    }, svg);
    visStr.push(path);

    // Wide transparent hitbox for easy touch
    const hit = mkEl('line', {
      x1: x, y1: NUT_Y, x2: x, y2: NECK_BOT,
      stroke: 'transparent', 'stroke-width': 15,
    }, svg);
    hit.style.cursor = 'pointer';
    // pointerup so a second finger can pluck while peg-turning
    hit.addEventListener('pointerup', (e) => {
      if (!states[i].enabled || states[i].snapped) return;
      if (e.pointerId === pegTurn.pointerId) return;
      selectedIdx = i;
      touchString(i);
      updateUI();
    });
  });

  // ── Headstock ──────────────────────────────────────────
  const hp = [
    `M ${HEAD_X + 9} ${HEAD_Y}`,
    `Q ${HEAD_X} ${HEAD_Y} ${HEAD_X} ${HEAD_Y + 11}`,
    `L ${HEAD_X} ${HEAD_Y + HEAD_H}`,
    `L ${HEAD_X + HEAD_W} ${HEAD_Y + HEAD_H}`,
    `L ${HEAD_X + HEAD_W} ${HEAD_Y + 11}`,
    `Q ${HEAD_X + HEAD_W} ${HEAD_Y} ${HEAD_X + HEAD_W - 9} ${HEAD_Y}`,
    'Z',
  ].join(' ');
  mkEl('path', { d: hp, fill: '#3d1e09', stroke: '#1a0a00', 'stroke-width': 2 }, svg);
  for (let i = 1; i <= 5; i++) {
    const gx = HEAD_X + i * (HEAD_W / 6);
    mkEl('line', { x1: gx, y1: HEAD_Y + 4, x2: gx, y2: HEAD_Y + HEAD_H - 4,
                   stroke: 'rgba(255,180,80,0.05)', 'stroke-width': 2 }, svg);
  }

  // ── String channels: nut → headstock interior ──────────
  STRINGS.forEach((s, i) => {
    const pp    = PEG_POS[i];
    const edgeX = pp.side === 'left' ? HEAD_X : HEAD_X + HEAD_W;
    mkEl('line', { x1: STR_X[i], y1: NUT_Y, x2: edgeX, y2: pp.y,
                   stroke: s.color, 'stroke-width': 1.5,
                   'stroke-dasharray': '4,3', opacity: 0.5 }, svg);
  });

  // ── Peg posts: headstock edge → barrel ─────────────────
  STRINGS.forEach((_, i) => {
    const pp      = PEG_POS[i];
    const edgeX   = pp.side === 'left' ? HEAD_X                  : HEAD_X + HEAD_W;
    const barrelX = pp.side === 'left' ? pp.x + PEG_R + 2        : pp.x - PEG_R - 2;
    mkEl('line', { x1: edgeX, y1: pp.y, x2: barrelX, y2: pp.y,
                   stroke: '#7a6020', 'stroke-width': 3.5 }, svg);
  });

  // ── Tuning pegs ────────────────────────────────────────
  STRINGS.forEach((_, i) => {
    const pp = PEG_POS[i];
    const g  = mkEl('g', { transform: `translate(${pp.x},${pp.y})` }, svg);

    // Peg cap
    mkEl('circle', { r: PEG_R, fill: '#C8A830', stroke: '#7a601a', 'stroke-width': 2 }, g);
    // Gloss highlight
    mkEl('ellipse', { cx: -4, cy: -4, rx: 5, ry: 3,
                      fill: 'rgba(255,255,200,0.35)' }, g);
    // Rotation indicator arm — points UP (12 o'clock) when in tune
    mkEl('line', { x1: 0, y1: 1.5, x2: 0, y2: -(PEG_R - 3),
                   stroke: '#2a1400', 'stroke-width': 2,
                   'stroke-linecap': 'round' }, g);
    mkEl('circle', { r: 2, fill: '#2a1400' }, g);

    pegGroups.push(g);

    // Long press activates circular peg-turning gesture
    g.style.cursor = 'grab';
    g.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      longPressOrigins[e.pointerId] = { x: e.clientX, y: e.clientY };
      longPressTimers[i] = setTimeout(() => {
        delete longPressTimers[i];
        activatePegTurn(i, e.pointerId, e.clientX, e.clientY);
      }, 350);
    });
    g.addEventListener('pointermove', (e) => {
      if (!longPressTimers[i]) return;
      const o  = longPressOrigins[e.pointerId] || { x: e.clientX, y: e.clientY };
      const dx = e.clientX - o.x, dy = e.clientY - o.y;
      if (dx * dx + dy * dy > 64) { // cancel if moved > 8 px
        clearTimeout(longPressTimers[i]);
        delete longPressTimers[i];
      }
    });
    ['pointerup', 'pointercancel'].forEach(ev => {
      g.addEventListener(ev, () => {
        if (longPressTimers[i]) { clearTimeout(longPressTimers[i]); delete longPressTimers[i]; }
      });
    });
  });

  // ── Peg-turn track overlay (hidden until long press) ───
  trackGroup = mkEl('g', { visibility: 'hidden' }, svg);
  mkEl('circle', { r: TRACK_R + 14, fill: 'rgba(0,0,0,0.58)' }, trackGroup);
  trackArcUp   = mkEl('path', { fill: 'none', stroke: '#4ade80',
                                 'stroke-width': 5, 'stroke-linecap': 'round' }, trackGroup);
  trackArcDown = mkEl('path', { fill: 'none', stroke: '#f87171',
                                 'stroke-width': 5, 'stroke-linecap': 'round' }, trackGroup);
  mkEl('circle', { r: TRACK_R, fill: 'none', stroke: 'rgba(255,255,255,0.25)',
                   'stroke-dasharray': '5,4', 'stroke-width': 1.5 }, trackGroup);
  // Rotating arrows — orbiting in "tune up" direction
  trackArrowGroup = mkEl('g', {}, trackGroup);
  for (let i = 0; i < 3; i++) {
    const arrow = mkEl('polygon', {
      points: '-5,4 0,-9 5,4',
      fill: '#fbbf24', opacity: '0.9',
    }, trackArrowGroup);
    trackArrows.push(arrow);
  }
  trackLabelUp   = mkEl('text', { 'text-anchor': 'middle', 'dominant-baseline': 'middle',
                                   'font-size': '13', 'font-weight': 'bold',
                                   fill: '#4ade80' }, trackGroup);
  trackLabelDown = mkEl('text', { 'text-anchor': 'middle', 'dominant-baseline': 'middle',
                                   'font-size': '13', 'font-weight': 'bold',
                                   fill: '#f87171' }, trackGroup);
  trackThumb = mkEl('circle', { r: 7, fill: 'white', stroke: '#1e293b',
                                 'stroke-width': 2, cx: 0, cy: -TRACK_R }, trackGroup);

  applyPegAngles();
  applyStringVisuals();
}

function applyPegAngles() {
  pegGroups.forEach((g, i) => {
    const angle = Math.max(-180, Math.min(180, states[i].offset));
    const pp    = PEG_POS[i];
    g.setAttribute('transform', `translate(${pp.x},${pp.y}) rotate(${angle})`);
  });
}

function applyStringVisuals() {
  STRINGS.forEach((s, i) => {
    visStr[i].setAttribute('stroke',  states[i].enabled ? s.color  : '#334155');
    visStr[i].setAttribute('opacity', states[i].enabled ? '1'      : '0.25');
  });
}

// ══════════════════════════════════════════════════════════════
// STRING TOGGLE BUTTONS  (right panel)
// ══════════════════════════════════════════════════════════════

function buildStrToggles() {
  const cont = document.getElementById('str-toggles');
  cont.innerHTML = '';
  STRINGS.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className        = 'str-toggle active';
    btn.textContent      = s.name;
    btn.style.color      = s.color;
    btn.addEventListener('click', () => toggleString(i));
    cont.appendChild(btn);
  });
}

function updateStrToggles() {
  document.querySelectorAll('.str-toggle').forEach((btn, i) => {
    btn.classList.toggle('active',   states[i].enabled);
    btn.classList.toggle('inactive', !states[i].enabled);
  });
}

// ══════════════════════════════════════════════════════════════
// STRING TOGGLE
// ══════════════════════════════════════════════════════════════

function toggleString(idx) {
  states[idx].enabled    = !states[idx].enabled;
  states[idx].offset     = states[idx].enabled ? randomOffset() : 0;
  states[idx].lastAction = null;
  applyPegAngles();
  applyStringVisuals();
  updateStrToggles();
  updateRefButtons();
}

// ══════════════════════════════════════════════════════════════
// PEG TURNING  (circular drag gesture)
// ══════════════════════════════════════════════════════════════

function clientToSVG(clientX, clientY) {
  // getScreenCTM accounts for CSS transforms (including the 15° rotation)
  const pt = svg.createSVGPoint();
  pt.x = clientX;
  pt.y = clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

function activatePegTurn(idx, pointerId, clientX, clientY) {
  if (!states[idx].enabled || states[idx].snapped) return;
  if (demoRunning) { demoRunning = false; return; }
  selectedIdx = idx;

  const svgPt = clientToSVG(clientX, clientY);
  const pp    = PEG_POS[idx];

  pegTurn.active    = true;
  pegTurn.idx       = idx;
  pegTurn.pointerId = pointerId;
  pegTurn.lastAngle = Math.atan2(svgPt.y - pp.y, svgPt.x - pp.x) * 180 / Math.PI;

  showPegTrackOverlay(idx, svgPt);
  updateUI();
}

function tickArrows() {
  arrowAngle = (arrowAngle + arrowDir * 0.4) % 360;
  if (trackArrowGroup) trackArrowGroup.setAttribute('transform', `rotate(${arrowAngle})`);
  arrowAnimFrame = requestAnimationFrame(tickArrows);
}

function startArrowAnim(clockwise) {
  arrowDir = clockwise ? 1 : -1;
  if (!arrowAnimFrame) arrowAnimFrame = requestAnimationFrame(tickArrows);
}

function stopArrowAnim() {
  if (arrowAnimFrame) { cancelAnimationFrame(arrowAnimFrame); arrowAnimFrame = null; }
}

// Update both orbit direction AND arrowhead orientation in one call
function setArrowDirection(clockwise) {
  stopArrowAnim();
  const rotOffset = clockwise ? 180 : 0; // CW orbit → CW tangent (θ+180); CCW → (θ+0)
  trackArrows.forEach((arrow, i) => {
    const θ = i * 120;
    const ax = TRACK_R * Math.cos(θ * Math.PI / 180);
    const ay = TRACK_R * Math.sin(θ * Math.PI / 180);
    arrow.setAttribute('transform',
      `translate(${ax.toFixed(1)},${ay.toFixed(1)}) rotate(${θ + rotOffset})`);
  });
  startArrowAnim(clockwise);
}

// closeOverlay=false: stop drag only (overlay stays); closeOverlay=true: full dismiss
function deactivatePegTurn(closeOverlay = true) {
  pegTurn.active    = false;
  pegTurn.pointerId = null;
  pegTurn.lastAngle = null;
  if (closeOverlay) {
    pegTurn.overlayOpen = false;
    pegTurn.idx         = -1;
    stopArrowAnim();
    if (trackGroup) trackGroup.setAttribute('visibility', 'hidden');
  }
}

function showPegTrackOverlay(idx, initialSvgPt) {
  const pp     = PEG_POS[idx];
  const isLeft = pp.side === 'left';
  const R      = TRACK_R;

  trackGroup.setAttribute('transform', `translate(${pp.x},${pp.y})`);

  // Left:  CCW = higher → green = left semicircle  (SVG sweep=0)
  // Right: CW  = higher → green = right semicircle (SVG sweep=1)
  if (isLeft) {
    trackArcUp.setAttribute('d',   `M 0 ${-R} A ${R} ${R} 0 0 0 0 ${R}`);
    trackArcDown.setAttribute('d', `M 0 ${-R} A ${R} ${R} 0 0 1 0 ${R}`);
    trackLabelUp.setAttribute('x',    String(-(R + 18)));
    trackLabelDown.setAttribute('x',  String( (R + 18)));
    startArrowAnim(false); // left peg: CCW = tune up
  } else {
    trackArcUp.setAttribute('d',   `M 0 ${-R} A ${R} ${R} 0 0 1 0 ${R}`);
    trackArcDown.setAttribute('d', `M 0 ${-R} A ${R} ${R} 0 0 0 0 ${R}`);
    trackLabelUp.setAttribute('x',    String( (R + 18)));
    trackLabelDown.setAttribute('x',  String(-(R + 18)));
    startArrowAnim(true); // right peg: CW = tune up
  }

  // CCW orbit: arrowhead at θ° points in CCW tangent direction = rotate(θ)
  // CW  orbit: arrowhead at θ° points in CW  tangent direction = rotate(θ+180)
  const rotOffset = isLeft ? 0 : 180;
  trackArrows.forEach((arrow, i) => {
    const θ = i * 120;
    const ax = TRACK_R * Math.cos(θ * Math.PI / 180);
    const ay = TRACK_R * Math.sin(θ * Math.PI / 180);
    arrow.setAttribute('transform',
      `translate(${ax.toFixed(1)},${ay.toFixed(1)}) rotate(${θ + rotOffset})`);
  });

  pegTurn.overlayOpen = true;
  trackLabelUp.setAttribute('y',   '0');
  trackLabelDown.setAttribute('y', '0');
  trackLabelUp.textContent   = '+';
  trackLabelDown.textContent = '−';

  if (initialSvgPt) {
    const dx = initialSvgPt.x - pp.x, dy = initialSvgPt.y - pp.y;
    const d  = Math.sqrt(dx * dx + dy * dy) || 1;
    trackThumb.setAttribute('cx', String((dx / d) * R));
    trackThumb.setAttribute('cy', String((dy / d) * R));
  } else {
    trackThumb.setAttribute('cx', '0');
    trackThumb.setAttribute('cy', String(-R));
  }

  trackGroup.setAttribute('visibility', 'visible');
}

// ══════════════════════════════════════════════════════════════
// CHECK INTONATION
// ══════════════════════════════════════════════════════════════

async function checkIntonation() {
  if (checking) return;
  checking = true;
  stopPlayerNote();

  const btn = document.getElementById('check-btn');
  btn.disabled    = true;
  btn.textContent = '♩ Playing reference…';

  await playAllRef();

  const container = document.getElementById('results');
  container.innerHTML = '';
  const parts = [];

  STRINGS.forEach((s, i) => {
    if (!states[i].enabled) return;

    const ab    = Math.abs(states[i].offset);
    const score = Math.max(0, parseFloat((3 - ab * 0.2).toFixed(1)));
    const down  = states[i].lastAction === 'down';

    let bg, icon;
    if      (ab <= 2)  { bg = '#16a34a'; icon = '✓'; }
    else if (ab <= 10) { bg = '#d97706'; icon = '~'; }
    else               { bg = '#dc2626'; icon = '✗'; }

    const row  = document.createElement('div');
    row.className = 'result-row';

    const pill = document.createElement('div');
    pill.className        = 'result-pill';
    pill.style.background = bg;
    pill.textContent      = `${s.name} ${icon}  ${score} pts`;
    row.appendChild(pill);

    if (ab <= 10 && down) {
      const w = document.createElement('span');
      w.className   = 'tune-up-warn';
      w.textContent = '↑ Tune up, not down!';
      row.appendChild(w);
    }

    container.appendChild(row);
    parts.push(`${s.name}:${score}`);
  });

  lastResult = parts.join(',');
  notifyParent(lastResult, true);

  btn.disabled    = false;
  btn.textContent = 'Check Intonation';
  checking        = false;
}

// ══════════════════════════════════════════════════════════════
// REFERENCE BUTTONS
// ══════════════════════════════════════════════════════════════

function buildRefButtons() {
  const cont = document.getElementById('ref-buttons');
  cont.innerHTML = '';
  STRINGS.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className        = 'ref-btn';
    btn.textContent      = s.name;
    btn.style.background = s.color;
    btn.addEventListener('click', () => {
      if (!states[i].enabled) return;
      selectedIdx = i;
      playRef(i);
      updateUI();
    });
    cont.appendChild(btn);
  });
}

function updateRefButtons() {
  document.querySelectorAll('.ref-btn').forEach((btn, i) => {
    btn.classList.toggle('selected',     i === selectedIdx);
    btn.classList.toggle('str-disabled', !states[i].enabled);
  });
}

// ══════════════════════════════════════════════════════════════
// UI UPDATE
// ══════════════════════════════════════════════════════════════

function updateUI() {
  updateRefButtons();
  updateStrToggles();
  applyStringVisuals();
  applyPegAngles();
}

// ══════════════════════════════════════════════════════════════
// postMessage
// ══════════════════════════════════════════════════════════════

function notifyParent(value, isComplete) {
  window.parent.postMessage({ type: 'taskmodule:response', value, isComplete }, '*');
}

// ══════════════════════════════════════════════════════════════
// TASK MODULE INTERFACE
// ══════════════════════════════════════════════════════════════

window.TaskModule = {
  init(context) {
    demoRunning  = false;
    disableSharp = false;
    lastResult   = null;
    states       = freshStates();
    buildRefButtons();
    buildStrToggles();
    buildSVG();
    updateUI();
    document.getElementById('results').innerHTML = '';
    if (context?.existingResponse) lastResult = context.existingResponse;
  },
  getResponse() { return lastResult || ''; },
  isComplete()  { return !!lastResult; },
  reset()       { this.init({}); },
};

// ══════════════════════════════════════════════════════════════
// SET TO IN-TUNE  &  AUTO-TUNE DEMO
// ══════════════════════════════════════════════════════════════

async function setToInTune() {
  if (demoRunning) return;
  await initAudio();
  deactivatePegTurn(true);
  STRINGS.forEach((_, i) => {
    if (!states[i].enabled || states[i].snapped) return;
    states[i].offset     = 0;
    states[i].lastAction = null;
  });
  applyPegAngles();
  // Strum each enabled string in sequence
  STRINGS.forEach((_, i) => {
    if (!states[i].enabled || states[i].snapped) return;
    setTimeout(() => touchString(i), i * 180);
  });
}

function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

function animateThumbArc(fromAngle, toAngle, duration) {
  return new Promise(resolve => {
    const start = performance.now();
    function frame(now) {
      if (!demoRunning) { resolve(); return; }
      const t  = Math.min((now - start) / duration, 1);
      const a  = fromAngle + (toAngle - fromAngle) * easeInOut(t);
      trackThumb.setAttribute('cx', (TRACK_R * Math.cos(a * Math.PI / 180)).toFixed(1));
      trackThumb.setAttribute('cy', (TRACK_R * Math.sin(a * Math.PI / 180)).toFixed(1));
      if (t < 1) requestAnimationFrame(frame);
      else resolve();
    }
    requestAnimationFrame(frame);
  });
}

async function tuneStringDemo(idx) {
  const pp      = PEG_POS[idx];
  const s       = states[idx];
  const dirMult = pp.side === 'left' ? -1 : 1;
  const isLeft  = pp.side === 'left';

  // Play reference pitch so student hears the target before tuning begins
  playRef(idx);
  await sleep(900);
  if (!demoRunning) return;

  // Show overlay
  pegTurn.idx = idx;
  selectedIdx = idx;
  showPegTrackOverlay(idx, null); // sets arrows for tune-up direction
  pegTurn.overlayOpen = true;
  updateUI();

  let thumbAngle = -90;
  trackThumb.setAttribute('cx', '0');
  trackThumb.setAttribute('cy', String(-TRACK_R));
  await sleep(400);

  // Inner helper: step toward a target offset, plucking each step
  // Returns updated thumbAngle
  let pluckCount = 0;
  async function stepToward(target) {
    while (demoRunning) {
      const remaining = target - s.offset;
      if (Math.abs(remaining) <= 2) break;
      // Cap step so we never overshoot — prevents ping-pong loop near target
      const stepCents = Math.sign(remaining) *
                        Math.min(Math.abs(remaining) > 20 ? 14 : 5, Math.abs(remaining));
      const da = stepCents / (CENTS_PER_DEG * dirMult);

      await animateThumbArc(thumbAngle, thumbAngle + da, 380);
      thumbAngle += da;

      s.offset += stepCents;
      if (Math.abs(s.offset - target) <= 2) s.offset = target;
      applyPegAngles();

      pluckCount++;
      touchString(idx);
      if (pluckCount % 3 === 0) {
        await sleep(220);
        if (!demoRunning) return;
        playRef(idx);
      }
      await sleep(550);
    }
  }

  // ── If SHARP: tune DOWN past reference first, then tune up ──
  if (s.offset > 2) {
    // Overshoot flat by 35–65 cents so the final approach is always upward
    const undershoot = -(35 + Math.floor(Math.random() * 30));
    setArrowDirection(isLeft); // CW for left peg = tune down; CCW for right = tune down
    await stepToward(undershoot);
    if (!demoRunning) return;

    // Brief pause so the direction change is noticeable
    await sleep(550);
    if (!demoRunning) return;
  }

  // ── Tune UP to reference ──
  setArrowDirection(!isLeft); // CCW for left peg = tune up; CW for right = tune up
  await stepToward(0);

  if (demoRunning) {
    s.offset = 0;
    applyPegAngles();
    touchString(idx);   // final in-tune pluck
    await sleep(700);
    playRef(idx);       // confirm — they should now match
    await sleep(900);
  }
}

async function runAutoTuneDemo() {
  if (demoRunning) {
    demoRunning = false;
    return;
  }

  const outOfTune = STRINGS.filter((_, i) => states[i].enabled && !states[i].snapped &&
                                             Math.abs(states[i].offset) > 2);
  if (outOfTune.length === 0) return;

  demoRunning = true;
  const btn = document.getElementById('autotune-btn');
  btn.textContent = '■ Stop Demo';

  await initAudio(); // ensure AudioContext is running before any sounds fire

  try {
    // ① Play all reference pitches — "this is what we're aiming for"
    for (let i = 0; i < 4; i++) {
      if (!demoRunning) break;
      if (!states[i].enabled || states[i].snapped) continue;
      playRef(i);
      await sleep(750);
    }
    await sleep(400);

    // ② Play each string as it currently sounds (out of tune)
    for (let i = 0; i < 4; i++) {
      if (!demoRunning) break;
      if (!states[i].enabled || states[i].snapped) continue;
      touchString(i);
      await sleep(750);
    }
    await sleep(600);

    // ③ Tune each string one at a time
    for (let i = 0; i < 4; i++) {
      if (!demoRunning) break;
      if (!states[i].enabled || states[i].snapped) continue;
      if (Math.abs(states[i].offset) <= 2) continue;
      await tuneStringDemo(i);
    }

    // ④ Final strum — all four strings in tune
    if (demoRunning) {
      deactivatePegTurn(true);
      await sleep(300);
      for (let i = 0; i < 4; i++) {
        if (!states[i].enabled || states[i].snapped) continue;
        touchString(i);
        await sleep(480);
      }
    }
  } finally {
    deactivatePegTurn(true);
    demoRunning = false;
    btn.textContent = 'Auto-Tune Demo';
  }
}

// ══════════════════════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════════════════════

function regenerateTuning() {
  if (demoRunning) return;
  deactivatePegTurn(true);
  states.forEach((s, i) => {
    if (!states[i].enabled || states[i].snapped) return;
    s.offset     = randomOffset();
    s.lastAction = null;
  });
  applyPegAngles();
  updateUI();
}

function toggleDisableSharp() {
  if (demoRunning) return;
  disableSharp = !disableSharp;
  const btn = document.getElementById('disable-sharp-btn');
  btn.classList.toggle('on', disableSharp);
  btn.textContent = disableSharp ? 'Sharp: OFF' : 'Disable Sharp';
  regenerateTuning();
}

document.getElementById('check-btn').addEventListener('click', checkIntonation);
document.getElementById('set-intune-btn').addEventListener('click', setToInTune);
document.getElementById('autotune-btn').addEventListener('click', runAutoTuneDemo);
document.getElementById('regen-btn').addEventListener('click', regenerateTuning);
document.getElementById('disable-sharp-btn').addEventListener('click', toggleDisableSharp);

// Peg rotation tracking via pointer events on the SVG
document.addEventListener('pointermove', (e) => {
  if (!pegTurn.active || e.pointerId !== pegTurn.pointerId) return;
  e.preventDefault();

  const svgPt = clientToSVG(e.clientX, e.clientY);
  const pp    = PEG_POS[pegTurn.idx];
  const angle = Math.atan2(svgPt.y - pp.y, svgPt.x - pp.x) * 180 / Math.PI;

  let da = angle - pegTurn.lastAngle;
  if (da >  180) da -= 360;
  if (da < -180) da += 360;
  pegTurn.lastAngle = angle;

  // Left peg: CCW (da<0) = pitch up → dirMult = −1
  // Right peg: CW  (da>0) = pitch up → dirMult = +1
  const dirMult    = pp.side === 'left' ? -1 : 1;
  const centsDelta = da * CENTS_PER_DEG * dirMult;

  const s       = states[pegTurn.idx];
  const newOff  = s.offset + centsDelta;

  // Snap if tuned more than a full step (200 ¢) too high
  if (newOff > 200) {
    snapString(pegTurn.idx);
    return;
  }

  s.offset = Math.max(-300, newOff);
  if (Math.abs(centsDelta) > 0.01)
    s.lastAction = centsDelta > 0 ? 'up' : 'down';

  applyPegAngles();

  const dx = svgPt.x - pp.x, dy = svgPt.y - pp.y;
  const d  = Math.sqrt(dx * dx + dy * dy) || 1;
  trackThumb.setAttribute('cx', String((dx / d) * TRACK_R));
  trackThumb.setAttribute('cy', String((dy / d) * TRACK_R));

  if (soundingIdx === pegTurn.idx && playerSynth) {
    playerSynth.frequency.rampTo(
      centsToFreq(STRINGS[pegTurn.idx].freq, s.offset), 0.02
    );
  }
}, { passive: false });

['pointerup', 'pointercancel'].forEach(ev => {
  document.addEventListener(ev, (e) => {
    if (pegTurn.active && e.pointerId === pegTurn.pointerId) {
      // Stop drag tracking but keep overlay visible
      pegTurn.active    = false;
      pegTurn.pointerId = null;
      pegTurn.lastAngle = null;
    }
  });
});

// Overlay dismissal and drag-restart on tap
document.addEventListener('pointerdown', (e) => {
  if (!pegTurn.overlayOpen) return;

  const svgPt  = clientToSVG(e.clientX, e.clientY);
  const pp     = PEG_POS[pegTurn.idx];
  const dx     = svgPt.x - pp.x, dy = svgPt.y - pp.y;
  const dist   = Math.sqrt(dx * dx + dy * dy);
  const onSVG  = e.composedPath().some(el => el === svg);

  if (dist <= TRACK_R + 18 && !pegTurn.active) {
    // Inside track circle — restart a drag stroke
    e.preventDefault();
    pegTurn.active    = true;
    pegTurn.pointerId = e.pointerId;
    pegTurn.lastAngle = Math.atan2(dy, dx) * 180 / Math.PI;
  } else if (!onSVG) {
    // Tap is completely outside the SVG (e.g. background) — close overlay
    deactivatePegTurn(true);
  }
  // Tap on SVG but outside track circle (e.g. string pluck) — keep overlay open
}, { capture: true });

// Suppress context menu from long-press
document.addEventListener('contextmenu', (e) => e.preventDefault());
svg.addEventListener('contextmenu', () => { if (pegTurn.overlayOpen) deactivatePegTurn(true); });

window.addEventListener('message', e => {
  if (e.data?.type === 'taskmodule:init') window.TaskModule.init(e.data.context || {});
});

// ══════════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════════

buildRefButtons();
buildStrToggles();
buildSVG();
updateUI();
</script>
