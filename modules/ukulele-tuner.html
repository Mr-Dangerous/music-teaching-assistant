<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ukulele Tuner</title>
  <!-- Tone.js — requires internet connection -->
  <script src="https://cdn.jsdelivr.net/npm/tone@14/build/Tone.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      padding: 8px 12px;
      gap: 6px;
    }

    /* ── Reference string buttons (top row) ── */
    #ref-buttons {
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    .ref-btn {
      width: 64px;
      height: 48px;
      border-radius: 14px;
      border: 3px solid transparent;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      transition: transform 0.1s, border-color 0.15s, box-shadow 0.15s;
    }

    .ref-btn.selected {
      border-color: white;
      transform: scale(1.08);
      box-shadow: 0 0 12px rgba(255,255,255,0.3);
    }

    .ref-btn.str-disabled {
      opacity: 0.28;
      cursor: default;
    }

    /* ── Ukulele SVG ── */
    #uke-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      justify-content: center;
    }

    #uke-svg {
      height: 100%;
      width: auto;
      touch-action: none; /* required for pointer events during peg turning */
      -webkit-touch-callout: none; /* suppress iOS long-press callout */
    }

    /* ── Pitch controls ── */
    #controls {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }

    .pitch-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      font-size: 24px;
      font-weight: 900;
      cursor: pointer;
      color: white;
      transition: transform 0.08s;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .pitch-btn:active { transform: scale(0.88); }

    #btn-flat  { background: linear-gradient(135deg, #b91c1c, #ef4444); }
    #btn-sharp { background: linear-gradient(135deg, #15803d, #22c55e); }

    #sel-label {
      font-size: 28px;
      font-weight: 800;
      width: 60px;
      text-align: center;
    }

    /* ── Check intonation button ── */
    #check-btn {
      padding: 10px 30px;
      border-radius: 24px;
      border: none;
      background: linear-gradient(135deg, #6d28d9, #a855f7);
      color: white;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s;
      flex-shrink: 0;
    }
    #check-btn:active { transform: scale(0.96); }
    #check-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* ── Results area ── */
    #results {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      min-height: 52px;
      flex-shrink: 0;
      width: 100%;
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
    }

    .result-pill {
      padding: 5px 16px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 15px;
      color: white;
      min-width: 90px;
      text-align: center;
    }

    .tune-up-warn {
      font-size: 12px;
      color: #fbbf24;
      font-style: italic;
    }

    /* ── Tone.js load error ── */
    #tone-error {
      display: none;
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #7f1d1d;
      color: #fca5a5;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="ref-buttons"></div>
  <div id="uke-wrap">
    <svg id="uke-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div id="controls">
    <button class="pitch-btn" id="btn-flat">♭</button>
    <div id="sel-label">–</div>
    <button class="pitch-btn" id="btn-sharp">♯</button>
  </div>
  <button id="check-btn">Check Intonation</button>
  <div id="results"></div>
</div>
<div id="tone-error">⚠ Audio unavailable — check internet connection</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════
// STRING DEFINITIONS  — standard re-entrant GCEA tuning
// ══════════════════════════════════════════════════════════════

const STRINGS = [
  { name: 'G', freq: 392.00, color: '#f87171', thickness: 1.9 },
  { name: 'C', freq: 261.63, color: '#fb923c', thickness: 2.7 },
  { name: 'E', freq: 329.63, color: '#4ade80', thickness: 2.1 },
  { name: 'A', freq: 440.00, color: '#60a5fa', thickness: 1.7 },
];

// ══════════════════════════════════════════════════════════════
// SVG LAYOUT CONSTANTS
// ══════════════════════════════════════════════════════════════

const VW = 320, VH = 500;
const CX = VW / 2;

const HEAD_X = 105, HEAD_Y = 22, HEAD_W = 110, HEAD_H = 130;
const NUT_Y   = HEAD_Y + HEAD_H;    // 152
const NECK_X  = CX - 35;            // 125
const NECK_W  = 70;
const NECK_BOT = 480;

// String x positions — evenly distributed across neck
const STR_X = [
  NECK_X + NECK_W * 0.18,  // G ≈ 138
  NECK_X + NECK_W * 0.39,  // C ≈ 152
  NECK_X + NECK_W * 0.61,  // E ≈ 168
  NECK_X + NECK_W * 0.82,  // A ≈ 182
];

// Tuning peg centres: G & C on left, E & A on right
// G is lower-left, C is upper-left (matching real instrument layout)
const PEG_POS = [
  { x: HEAD_X - 44, y: HEAD_Y + 90,  side: 'left'  }, // G — lower left
  { x: HEAD_X - 44, y: HEAD_Y + 30,  side: 'left'  }, // C — upper left
  { x: HEAD_X + HEAD_W + 44, y: HEAD_Y + 30,  side: 'right' }, // E — upper right
  { x: HEAD_X + HEAD_W + 44, y: HEAD_Y + 90,  side: 'right' }, // A — lower right
];

// Fret positions as fraction of neck length (equal temperament)
const FRET_RATIOS = [0, 0.0561, 0.1091, 0.1591, 0.2063, 0.2508,
                     0.2929, 0.3325, 0.3699, 0.4052, 0.4384, 0.4697];
const DOT_FRETS = [4, 6, 9]; // position markers at fret indices

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════

let selectedIdx = 0;
let lastResult  = null;
let checking    = false;

// ── Peg turning state ──────────────────────────────────
const pegTurn = { active: false, idx: -1, pointerId: null, lastAngle: null };
const longPressTimers  = {};  // keyed by string index
const longPressOrigins = {};  // { x, y } per pointerId, for movement threshold
const TRACK_R       = 35;          // circular track radius in SVG units
const CENTS_PER_DEG = 100 / 360;  // one semitone per full revolution

function freshStates() {
  return STRINGS.map(() => ({
    enabled:    true,
    offset:     randomOffset(), // cents from reference
    lastAction: null,           // 'up' | 'down'
  }));
}

let states = freshStates();

function randomOffset() {
  // ~70% chance flat (more natural for real ukuleles), ~30% sharp.
  // Always at least 12 cents off. Range: -12 to -200 flat, +12 to +100 sharp.
  const flat  = () => -(Math.floor(Math.random() * 189) + 12);
  const sharp = () =>   Math.floor(Math.random() *  89) + 12;
  return Math.random() < 0.7 ? flat() : sharp();
}

function centsToFreq(base, cents) {
  return base * Math.pow(2, cents / 1200);
}

// ══════════════════════════════════════════════════════════════
// AUDIO  (Tone.js)
//   playerSynth — plays student's adjusted pitch; supports live
//                 frequency glide via frequency.rampTo()
//   refSynth    — Karplus-Strong pluck for reference pitches
// ══════════════════════════════════════════════════════════════

let playerSynth  = null;
let refSynth     = null;
let reverb       = null;
let soundingIdx  = -1;   // string index currently ringing in playerSynth
let releaseTimer = null;

function initAudio() {
  if (playerSynth) return;

  if (typeof Tone === 'undefined') {
    document.getElementById('tone-error').style.display = 'block';
    return;
  }

  Tone.start();

  reverb = new Tone.Reverb({ decay: 1.3, wet: 0.16 }).toDestination();

  // Triangle oscillator with 8 harmonics + plucky envelope
  playerSynth = new Tone.Synth({
    oscillator: { type: 'triangle8' },
    envelope:   { attack: 0.005, decay: 0.55, sustain: 0.07, release: 2.8 },
    volume:     -4,
  }).connect(reverb);

  // Karplus-Strong pluck — distinctly different timbre for reference
  refSynth = new Tone.PluckSynth({
    attackNoise: 1.0,
    dampening:   3600,
    resonance:   0.97,
    volume:      -2,
  }).connect(reverb);
}

function touchString(idx) {
  initAudio();
  if (!playerSynth) return;

  const freq = centsToFreq(STRINGS[idx].freq, states[idx].offset);

  // Stop any existing note first
  stopPlayerNote();

  playerSynth.triggerAttack(freq);
  soundingIdx = idx;

  // Auto-release after 2.5 s
  releaseTimer = setTimeout(stopPlayerNote, 2500);
}

function stopPlayerNote() {
  if (releaseTimer) { clearTimeout(releaseTimer); releaseTimer = null; }
  if (soundingIdx >= 0 && playerSynth) {
    try { playerSynth.triggerRelease(); } catch (_) {}
    soundingIdx = -1;
  }
}

function playRef(idx) {
  initAudio();
  if (!refSynth) return;
  refSynth.triggerAttackRelease(STRINGS[idx].freq, '2n');
}

async function playAllRef() {
  for (let i = 0; i < 4; i++) {
    if (!states[i].enabled) continue;
    playRef(i);
    await sleep(650);
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

// ══════════════════════════════════════════════════════════════
// SVG CONSTRUCTION
// ══════════════════════════════════════════════════════════════

const NS  = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('uke-svg');

let pegGroups    = [];  // <g> elements rotated for peg angle
let visStr       = [];  // visible string <line> elements
let cbElems      = [];  // { bg, mark } checkbox elements per string

// Track overlay elements (populated in buildSVG)
let trackGroup    = null;
let trackArcUp    = null;
let trackArcDown  = null;
let trackThumb    = null;
let trackLabelUp  = null;
let trackLabelDown = null;

function mkEl(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}

function buildSVG() {
  svg.innerHTML = '';
  svg.setAttribute('viewBox', `0 0 ${VW} ${VH}`);
  pegGroups = []; visStr = []; cbElems = [];

  const neckH = NECK_BOT - NUT_Y;

  // ── Neck body ──────────────────────────────────────────
  mkEl('rect', { x: NECK_X, y: NUT_Y, width: NECK_W, height: neckH,
                 fill: '#7c4f1e', rx: 3 }, svg);
  // Edge shading
  mkEl('rect', { x: NECK_X,              y: NUT_Y, width: 5, height: neckH,
                 fill: 'rgba(0,0,0,0.22)', rx: 2 }, svg);
  mkEl('rect', { x: NECK_X + NECK_W - 5, y: NUT_Y, width: 5, height: neckH,
                 fill: 'rgba(0,0,0,0.22)', rx: 2 }, svg);

  // ── Frets ──────────────────────────────────────────────
  FRET_RATIOS.forEach((r, i) => {
    const y = NUT_Y + r * neckH;
    mkEl('line', { x1: NECK_X - 2, y1: y, x2: NECK_X + NECK_W + 2, y2: y,
                   stroke: i === 0 ? '#e8d5a0' : '#bbb',
                   'stroke-width': i === 0 ? 5 : 1.5 }, svg);
  });

  // Fret position dots
  DOT_FRETS.forEach(fi => {
    const y = NUT_Y + FRET_RATIOS[fi] * neckH;
    mkEl('circle', { cx: CX, cy: y + 14, r: 5,
                     fill: '#c8893a', opacity: 0.75 }, svg);
  });

  // ── Strings ────────────────────────────────────────────
  STRINGS.forEach((s, i) => {
    const x    = STR_X[i];
    const line = mkEl('line', {
      x1: x, y1: NUT_Y, x2: x, y2: NECK_BOT,
      stroke: s.color, 'stroke-width': s.thickness, 'stroke-linecap': 'round',
    }, svg);
    visStr.push(line);

    // Wide transparent hitbox for easy touch
    const hit = mkEl('line', {
      x1: x, y1: NUT_Y, x2: x, y2: NECK_BOT,
      stroke: 'transparent', 'stroke-width': 28,
    }, svg);
    hit.style.cursor = 'pointer';
    // Use pointerup so a second finger can pluck a string while peg-turning
    hit.addEventListener('pointerup', (e) => {
      if (!states[i].enabled) return;
      if (e.pointerId === pegTurn.pointerId) return; // ignore peg-turn pointer
      selectedIdx = i;
      touchString(i);
      updateUI();
    });
  });

  // ── Headstock ──────────────────────────────────────────
  const hp = [
    `M ${HEAD_X + 16} ${HEAD_Y}`,
    `Q ${HEAD_X} ${HEAD_Y} ${HEAD_X} ${HEAD_Y + 20}`,
    `L ${HEAD_X} ${HEAD_Y + HEAD_H}`,
    `L ${HEAD_X + HEAD_W} ${HEAD_Y + HEAD_H}`,
    `L ${HEAD_X + HEAD_W} ${HEAD_Y + 20}`,
    `Q ${HEAD_X + HEAD_W} ${HEAD_Y} ${HEAD_X + HEAD_W - 16} ${HEAD_Y}`,
    'Z',
  ].join(' ');
  mkEl('path', { d: hp, fill: '#3d1e09', stroke: '#1a0a00', 'stroke-width': 2 }, svg);

  // Subtle wood grain
  for (let i = 1; i <= 4; i++) {
    const gx = HEAD_X + i * (HEAD_W / 5);
    mkEl('line', { x1: gx, y1: HEAD_Y + 8, x2: gx, y2: HEAD_Y + HEAD_H - 8,
                   stroke: 'rgba(255,180,80,0.055)', 'stroke-width': 2 }, svg);
  }

  // ── String channels: nut → headstock interior ──────────
  STRINGS.forEach((s, i) => {
    const pp    = PEG_POS[i];
    const edgeX = pp.side === 'left' ? HEAD_X : HEAD_X + HEAD_W;
    mkEl('line', { x1: STR_X[i], y1: NUT_Y, x2: edgeX, y2: pp.y,
                   stroke: s.color, 'stroke-width': 1.4,
                   'stroke-dasharray': '4,3', opacity: 0.5 }, svg);
  });

  // ── Peg posts: headstock edge → barrel ─────────────────
  STRINGS.forEach((_, i) => {
    const pp      = PEG_POS[i];
    const edgeX   = pp.side === 'left' ? HEAD_X          : HEAD_X + HEAD_W;
    const barrelX = pp.side === 'left' ? pp.x + 13       : pp.x - 13;
    mkEl('line', { x1: edgeX, y1: pp.y, x2: barrelX, y2: pp.y,
                   stroke: '#7a6020', 'stroke-width': 5 }, svg);
  });

  // ── Tuning pegs ────────────────────────────────────────
  STRINGS.forEach((_, i) => {
    const pp = PEG_POS[i];
    const g  = mkEl('g', { transform: `translate(${pp.x},${pp.y})` }, svg);

    // Peg cap (circle face)
    mkEl('circle', { r: 12, fill: '#C8A830', stroke: '#7a601a', 'stroke-width': 1.5 }, g);
    // Glossy highlight
    mkEl('ellipse', { cx: -4, cy: -4, rx: 5, ry: 3, fill: 'rgba(255,255,200,0.38)' }, g);
    // Rotation indicator arm — points UP when in tune (offset = 0)
    mkEl('line', { x1: 0, y1: 2, x2: 0, y2: -9,
                   stroke: '#2a1400', 'stroke-width': 2.5, 'stroke-linecap': 'round' }, g);
    mkEl('circle', { r: 2, fill: '#2a1400' }, g);

    pegGroups.push(g);

    // ── Long press → circular peg turning ──────────────
    g.style.cursor = 'grab';
    g.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      longPressOrigins[e.pointerId] = { x: e.clientX, y: e.clientY };
      longPressTimers[i] = setTimeout(() => {
        delete longPressTimers[i];
        activatePegTurn(i, e.pointerId, e.clientX, e.clientY);
      }, 350);
    });
    g.addEventListener('pointermove', (e) => {
      if (!longPressTimers[i]) return;
      const o  = longPressOrigins[e.pointerId] || { x: e.clientX, y: e.clientY };
      const dx = e.clientX - o.x, dy = e.clientY - o.y;
      if (dx * dx + dy * dy > 64) { // cancel if moved > 8px before timer fires
        clearTimeout(longPressTimers[i]);
        delete longPressTimers[i];
      }
    });
    ['pointerup', 'pointercancel'].forEach(ev => {
      g.addEventListener(ev, () => {
        if (longPressTimers[i]) { clearTimeout(longPressTimers[i]); delete longPressTimers[i]; }
      });
    });

    // ── Instructor checkbox (above each peg) ───────────
    const cbX = pp.x - 10;
    const cbY = pp.y - 30;

    const cbG = mkEl('g', {}, svg);
    cbG.style.cursor = 'pointer';
    cbG.addEventListener('click', () => toggleString(i));

    const bg   = mkEl('rect',  { x: cbX, y: cbY, width: 20, height: 20, rx: 4,
                                  fill: 'white', stroke: '#475569', 'stroke-width': 1.5 }, cbG);
    const mark = mkEl('text',  { x: cbX + 10, y: cbY + 15, 'text-anchor': 'middle',
                                  'font-size': '14', 'font-weight': 'bold', fill: '#16a34a' }, cbG);
    mark.textContent = '✓';

    cbElems.push({ bg, mark });
  });

  applyPegAngles();
  applyStringVisuals();
  applyCheckboxVisuals();

  // ── Circular peg-turn track overlay (hidden until long press) ──
  trackGroup = mkEl('g', { visibility: 'hidden' }, svg);

  // Dark halo so the overlay reads over any background
  mkEl('circle', { r: TRACK_R + 10, fill: 'rgba(0,0,0,0.50)' }, trackGroup);
  // Higher-pitch arc (green)
  trackArcUp   = mkEl('path', { fill: 'none', stroke: '#4ade80',
                                 'stroke-width': 5, 'stroke-linecap': 'round' }, trackGroup);
  // Lower-pitch arc (red)
  trackArcDown = mkEl('path', { fill: 'none', stroke: '#f87171',
                                 'stroke-width': 5, 'stroke-linecap': 'round' }, trackGroup);
  // Full dashed track guide
  mkEl('circle', { r: TRACK_R, fill: 'none', stroke: 'rgba(255,255,255,0.35)',
                   'stroke-dasharray': '5,4', 'stroke-width': 1.5 }, trackGroup);
  // Direction labels
  trackLabelUp   = mkEl('text', { 'text-anchor': 'middle', 'dominant-baseline': 'middle',
                                   'font-size': '13', 'font-weight': 'bold',
                                   fill: '#4ade80' }, trackGroup);
  trackLabelDown = mkEl('text', { 'text-anchor': 'middle', 'dominant-baseline': 'middle',
                                   'font-size': '13', 'font-weight': 'bold',
                                   fill: '#f87171' }, trackGroup);
  // Finger position indicator dot
  trackThumb = mkEl('circle', { r: 7, fill: 'white', stroke: '#1e293b',
                                 'stroke-width': 1.5, cx: 0, cy: -TRACK_R }, trackGroup);
}

// 1 degree per cent of offset — indicator arm at 12 o'clock = in tune
function applyPegAngles() {
  pegGroups.forEach((g, i) => {
    const angle = Math.max(-180, Math.min(180, states[i].offset));
    const pp    = PEG_POS[i];
    g.setAttribute('transform', `translate(${pp.x},${pp.y}) rotate(${angle})`);
  });
}

function applyStringVisuals() {
  STRINGS.forEach((s, i) => {
    visStr[i].setAttribute('stroke',  states[i].enabled ? s.color   : '#334155');
    visStr[i].setAttribute('opacity', states[i].enabled ? '1'       : '0.25');
  });
}

function applyCheckboxVisuals() {
  cbElems.forEach(({ bg, mark }, i) => {
    const on = states[i].enabled;
    bg.setAttribute('fill',   on ? 'white'    : '#1e293b');
    mark.setAttribute('fill', on ? '#16a34a'  : 'transparent');
  });
}

// ══════════════════════════════════════════════════════════════
// STRING TOGGLE  (instructor control)
// ══════════════════════════════════════════════════════════════

function toggleString(idx) {
  states[idx].enabled    = !states[idx].enabled;
  states[idx].offset     = states[idx].enabled ? randomOffset() : 0;
  states[idx].lastAction = null;
  applyPegAngles();
  applyStringVisuals();
  applyCheckboxVisuals();
  updateRefButtons();
}

// ══════════════════════════════════════════════════════════════
// PEG TURNING  (circular drag gesture)
// ══════════════════════════════════════════════════════════════

function clientToSVG(clientX, clientY) {
  const rect = svg.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (VW / rect.width),
    y: (clientY - rect.top)  * (VH / rect.height),
  };
}

function activatePegTurn(idx, pointerId, clientX, clientY) {
  if (!states[idx].enabled) return;
  selectedIdx = idx;

  const svgPt = clientToSVG(clientX, clientY);
  const pp    = PEG_POS[idx];

  pegTurn.active    = true;
  pegTurn.idx       = idx;
  pegTurn.pointerId = pointerId;
  pegTurn.lastAngle = Math.atan2(svgPt.y - pp.y, svgPt.x - pp.x) * 180 / Math.PI;

  showPegTrackOverlay(idx, svgPt);
  updateUI();
}

function deactivatePegTurn() {
  pegTurn.active    = false;
  pegTurn.idx       = -1;
  pegTurn.pointerId = null;
  pegTurn.lastAngle = null;
  if (trackGroup) trackGroup.setAttribute('visibility', 'hidden');
}

function showPegTrackOverlay(idx, initialSvgPt) {
  const pp     = PEG_POS[idx];
  const isLeft = pp.side === 'left';
  const R      = TRACK_R;

  trackGroup.setAttribute('transform', `translate(${pp.x},${pp.y})`);

  // Left peg:  CCW = higher → green arc = left semicircle  (sweep-flag 0 = CCW)
  // Right peg: CW  = higher → green arc = right semicircle (sweep-flag 1 = CW)
  if (isLeft) {
    trackArcUp.setAttribute('d',   `M 0 ${-R} A ${R} ${R} 0 0 0 0 ${R}`);
    trackArcDown.setAttribute('d', `M 0 ${-R} A ${R} ${R} 0 0 1 0 ${R}`);
    trackLabelUp.setAttribute('x',    String(-(R + 13)));
    trackLabelDown.setAttribute('x',  String( (R + 13)));
  } else {
    trackArcUp.setAttribute('d',   `M 0 ${-R} A ${R} ${R} 0 0 1 0 ${R}`);
    trackArcDown.setAttribute('d', `M 0 ${-R} A ${R} ${R} 0 0 0 0 ${R}`);
    trackLabelUp.setAttribute('x',    String( (R + 13)));
    trackLabelDown.setAttribute('x',  String(-(R + 13)));
  }
  trackLabelUp.setAttribute('y',   '0');
  trackLabelDown.setAttribute('y', '0');
  trackLabelUp.textContent   = '+';
  trackLabelDown.textContent = '−';

  // Snap thumb to initial touch position
  if (initialSvgPt) {
    const dx = initialSvgPt.x - pp.x, dy = initialSvgPt.y - pp.y;
    const d  = Math.sqrt(dx*dx + dy*dy) || 1;
    trackThumb.setAttribute('cx', String((dx / d) * R));
    trackThumb.setAttribute('cy', String((dy / d) * R));
  } else {
    trackThumb.setAttribute('cx', '0');
    trackThumb.setAttribute('cy', String(-R));
  }

  trackGroup.setAttribute('visibility', 'visible');
}

// ══════════════════════════════════════════════════════════════
// PITCH ADJUSTMENT
// ══════════════════════════════════════════════════════════════

function adjustPitch(dir) {
  const s = states[selectedIdx];
  if (!s.enabled) return;

  s.offset    = Math.max(-300, Math.min(250, s.offset + (dir === 'up' ? 1 : -1)));
  s.lastAction = dir;

  applyPegAngles();

  // If this string is currently ringing, glide its pitch in real time
  if (soundingIdx === selectedIdx && playerSynth) {
    const newFreq = centsToFreq(STRINGS[selectedIdx].freq, s.offset);
    playerSynth.frequency.rampTo(newFreq, 0.03);
  }
}

let holdTimer = null;

function startHold(dir) {
  adjustPitch(dir);
  holdTimer = setInterval(() => adjustPitch(dir), 65);
}

function stopHold() {
  if (holdTimer) { clearInterval(holdTimer); holdTimer = null; }
}

// ══════════════════════════════════════════════════════════════
// CHECK INTONATION
// ══════════════════════════════════════════════════════════════

async function checkIntonation() {
  if (checking) return;
  checking = true;
  stopPlayerNote();

  const btn = document.getElementById('check-btn');
  btn.disabled    = true;
  btn.textContent = '♩ Playing reference…';

  await playAllRef();

  const container = document.getElementById('results');
  container.innerHTML = '';

  const parts = [];

  STRINGS.forEach((s, i) => {
    if (!states[i].enabled) return;

    const ab    = Math.abs(states[i].offset);
    const score = Math.max(0, parseFloat((3 - ab * 0.2).toFixed(1)));
    const down  = states[i].lastAction === 'down';

    let bg, icon;
    if      (ab <= 2)  { bg = '#16a34a'; icon = '✓'; }
    else if (ab <= 10) { bg = '#d97706'; icon = '~'; }
    else               { bg = '#dc2626'; icon = '✗'; }

    const row  = document.createElement('div');
    row.className = 'result-row';

    const pill = document.createElement('div');
    pill.className      = 'result-pill';
    pill.style.background = bg;
    pill.textContent    = `${s.name} ${icon}  ${score} pts`;
    row.appendChild(pill);

    // Warn if the student tuned DOWN to reach the target
    if (ab <= 10 && down) {
      const w = document.createElement('span');
      w.className   = 'tune-up-warn';
      w.textContent = '↑ Tune up, not down!';
      row.appendChild(w);
    }

    container.appendChild(row);
    parts.push(`${s.name}:${score}`);
  });

  lastResult = parts.join(',');
  notifyParent(lastResult, true);

  btn.disabled    = false;
  btn.textContent = 'Check Intonation';
  checking        = false;
}

// ══════════════════════════════════════════════════════════════
// REFERENCE BUTTONS
// ══════════════════════════════════════════════════════════════

function buildRefButtons() {
  const cont = document.getElementById('ref-buttons');
  cont.innerHTML = '';
  STRINGS.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className        = 'ref-btn';
    btn.textContent      = s.name;
    btn.style.background = s.color;
    btn.addEventListener('click', () => {
      if (!states[i].enabled) return;
      selectedIdx = i;
      playRef(i);
      updateUI();
    });
    cont.appendChild(btn);
  });
}

function updateRefButtons() {
  document.querySelectorAll('.ref-btn').forEach((btn, i) => {
    btn.classList.toggle('selected',     i === selectedIdx);
    btn.classList.toggle('str-disabled', !states[i].enabled);
  });
}

// ══════════════════════════════════════════════════════════════
// UI UPDATE
// ══════════════════════════════════════════════════════════════

function updateUI() {
  updateRefButtons();

  const label = document.getElementById('sel-label');
  label.textContent = STRINGS[selectedIdx].name;
  label.style.color = states[selectedIdx].enabled
    ? STRINGS[selectedIdx].color : '#475569';

  const active = states[selectedIdx].enabled;
  document.getElementById('btn-flat').style.opacity  = active ? '1' : '0.3';
  document.getElementById('btn-sharp').style.opacity = active ? '1' : '0.3';

  applyStringVisuals();
  applyCheckboxVisuals();
  applyPegAngles();
}

// ══════════════════════════════════════════════════════════════
// postMessage
// ══════════════════════════════════════════════════════════════

function notifyParent(value, isComplete) {
  window.parent.postMessage({ type: 'taskmodule:response', value, isComplete }, '*');
}

// ══════════════════════════════════════════════════════════════
// TASK MODULE INTERFACE
// ══════════════════════════════════════════════════════════════

window.TaskModule = {
  init(context) {
    lastResult = null;
    states     = freshStates();
    buildRefButtons();
    buildSVG();
    updateUI();
    document.getElementById('results').innerHTML = '';
    if (context?.existingResponse) {
      lastResult = context.existingResponse;
    }
  },
  getResponse() { return lastResult || ''; },
  isComplete()  { return !!lastResult; },
  reset()       { this.init({}); },
};

// ══════════════════════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════════════════════

const flatBtn  = document.getElementById('btn-flat');
const sharpBtn = document.getElementById('btn-sharp');

// Hold-to-repeat for pitch buttons (no sound during repeat — only on string touch)
flatBtn.addEventListener('mousedown',   () => startHold('down'));
flatBtn.addEventListener('touchstart',  (e) => { e.preventDefault(); startHold('down'); }, { passive: false });
sharpBtn.addEventListener('mousedown',  () => startHold('up'));
sharpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startHold('up'); },  { passive: false });

['mouseup', 'mouseleave', 'touchend', 'touchcancel'].forEach(ev => {
  flatBtn.addEventListener(ev,  stopHold);
  sharpBtn.addEventListener(ev, stopHold);
});

document.getElementById('check-btn').addEventListener('click', checkIntonation);

// ── Peg rotation tracking ───────────────────────────────────
svg.addEventListener('pointermove', (e) => {
  if (!pegTurn.active || e.pointerId !== pegTurn.pointerId) return;
  e.preventDefault();

  const svgPt = clientToSVG(e.clientX, e.clientY);
  const pp    = PEG_POS[pegTurn.idx];
  const angle = Math.atan2(svgPt.y - pp.y, svgPt.x - pp.x) * 180 / Math.PI;

  let da = angle - pegTurn.lastAngle;
  if (da >  180) da -= 360; // normalise to −180…+180
  if (da < -180) da += 360;
  pegTurn.lastAngle = angle;

  // Left pegs: CCW (da < 0) = pitch up  → dirMult = −1
  // Right pegs: CW (da > 0) = pitch up  → dirMult = +1
  const dirMult    = pp.side === 'left' ? -1 : 1;
  const centsDelta = da * CENTS_PER_DEG * dirMult;

  const s  = states[pegTurn.idx];
  s.offset = Math.max(-300, Math.min(250, s.offset + centsDelta));
  if (Math.abs(centsDelta) > 0.01)
    s.lastAction = centsDelta > 0 ? 'up' : 'down';

  applyPegAngles();

  // Move thumb dot to current finger position on the track ring
  const dx = svgPt.x - pp.x, dy = svgPt.y - pp.y;
  const d  = Math.sqrt(dx*dx + dy*dy) || 1;
  trackThumb.setAttribute('cx', String((dx / d) * TRACK_R));
  trackThumb.setAttribute('cy', String((dy / d) * TRACK_R));

  // Glide pitch if this string is currently ringing
  if (soundingIdx === pegTurn.idx && playerSynth) {
    playerSynth.frequency.rampTo(
      centsToFreq(STRINGS[pegTurn.idx].freq, s.offset), 0.02
    );
  }
}, { passive: false });

['pointerup', 'pointercancel'].forEach(ev => {
  document.addEventListener(ev, (e) => {
    if (pegTurn.active && e.pointerId === pegTurn.pointerId) deactivatePegTurn();
  });
});

// Suppress native context menu on long-press / right-click;
// also use right-click as a dismiss gesture for the overlay
svg.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  if (pegTurn.active) deactivatePegTurn();
});

window.addEventListener('message', e => {
  if (e.data?.type === 'taskmodule:init') {
    window.TaskModule.init(e.data.context || {});
  }
});

// ══════════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════════

buildRefButtons();
buildSVG();
updateUI();
</script>
