name: Auto-generate module manifest

# Runs whenever an HTML module is added, renamed, or removed.
# Extracts each module's <title> tag for the display name, then
# commits the updated manifest.json back to master.

on:
  push:
    branches: [master]
    paths:
      - 'modules/*.html'

jobs:
  generate-manifest:
    runs-on: ubuntu-latest
    # Skip if the commit itself was made by this workflow (prevents infinite loop)
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate manifest.json from module <title> tags
        run: |
          node -e "
            const fs = require('fs');

            const EXCLUDED = ['_template.html'];
            const dir = 'modules';

            const files = fs.readdirSync(dir)
              .filter(f => f.endsWith('.html') && !EXCLUDED.includes(f))
              .sort();

            const manifest = files.map(file => {
              const html    = fs.readFileSync(dir + '/' + file, 'utf8');
              const match   = html.match(/<title[^>]*>(.*?)<\/title>/i);
              const taskId  = file.replace('.html', '');
              const question = match
                ? match[1].trim()
                : taskId.split(/[-_]/).map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
              return {
                task_id:     taskId,
                question:    question,
                module_path: dir + '/' + file
              };
            });

            fs.writeFileSync(
              dir + '/manifest.json',
              JSON.stringify(manifest, null, 2) + '\n'
            );

            console.log('Generated manifest.json with ' + manifest.length + ' modules:');
            manifest.forEach(m => console.log('  ' + m.task_id + ': ' + m.question));
          "

      - name: Commit manifest if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add modules/manifest.json
          if git diff --staged --quiet; then
            echo "manifest.json unchanged — nothing to commit"
          else
            git commit -m "Auto-update manifest.json [skip ci]"
            git push
          fi
