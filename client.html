<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Student — Music Teaching Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb, #f5576c, #fda085);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      color: white;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Screen system ─────────────────────────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .screen.active { display: flex; }

    /* Module screen: no padding, white bg, iframe fills it */
    #module-screen { padding: 0; background: #fff; }

    /* ── Glass card ─────────────────────────────────────────────────────────── */
    .card {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(14px);
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.35);
      padding: 28px 24px;
      text-align: center;
      width: 100%;
      max-width: 480px;
    }

    h2 { font-size: 1.8rem; margin-bottom: 6px; }

    .subtitle {
      opacity: 0.8;
      margin-bottom: 20px;
      font-size: 0.97rem;
      line-height: 1.4;
    }

    /* ── Buttons ─────────────────────────────────────────────────────────────  */
    .btn {
      padding: 14px 22px;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, filter 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover  { filter: brightness(1.1); }
    .btn:active { transform: scale(0.95); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-green  { background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; }
    .btn-purple { background: linear-gradient(135deg, #6c63ff, #9b59b6); color: #fff; }
    .btn-orange { background: linear-gradient(135deg, #f7971e, #ffd200); color: #333; }
    .btn-ghost  {
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.4);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.35); }

    /* ── Spinner ─────────────────────────────────────────────────────────────  */
    .spinner {
      width: 52px; height: 52px;
      border: 5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { color: #ffd700; font-size: 0.88rem; margin-top: 10px; min-height: 1.2em; }

    /* ── Name picker ─────────────────────────────────────────────────────────  */
    .name-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .name-btn {
      padding: 18px 10px;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .name-btn:active { transform: scale(0.95); }
    .name-btn.selected {
      background: rgba(56, 239, 125, 0.35);
      border-color: #38ef7d;
    }

    .selection-hint {
      font-size: 0.82rem;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    /* ── Waiting screen ──────────────────────────────────────────────────────  */
    .pulse-ring {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      margin: 0 auto 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1);    opacity: 0.7; }
      50%      { transform: scale(1.08); opacity: 1;   }
    }

    /* ── Active student badge ────────────────────────────────────────────────  */
    .student-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.45);
      border-radius: 20px;
      padding: 6px 14px 6px 10px;
      font-size: 0.9rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(6px);
      z-index: 10;
      cursor: pointer;
      user-select: none;
    }
    .student-badge:hover { background: rgba(0,0,0,0.6); }

    .badge-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #38ef7d;
      flex-shrink: 0;
    }

    .next-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 12px;
      color: white;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 6px 12px;
      cursor: pointer;
      z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }
    .next-btn:active { transform: scale(0.95); }
    .next-btn.hidden { display: none; }

    /* ── Module iframe ───────────────────────────────────────────────────────  */
    #module-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Practice badge (shown inside module screen) ─────────────────────────  */
    #practice-badge {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(108, 99, 255, 0.85);
      border-radius: 12px;
      padding: 4px 14px;
      font-size: 0.78rem;
      font-weight: 700;
      z-index: 10;
      pointer-events: none;
      display: none;
    }
    #practice-badge.visible { display: block; }

    /* ── Overlay (task complete / practice complete) ─────────────────────────  */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 20;
    }
    .overlay.active { display: flex; }

    .checkmark { font-size: 4.5rem; display: block; margin-bottom: 12px;
      animation: pop 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
    @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

    .overlay h2   { font-size: 2rem; margin-bottom: 6px; }
    .overlay .sub { opacity: 0.8; margin-bottom: 24px; font-size: 0.97rem; }

    .overlay-btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>

<!-- ── Screen 1: Connecting ───────────────────────────────────────────────── -->
<div id="connecting-screen" class="screen active">
  <div class="card">
    <div class="spinner"></div>
    <h2>Connecting…</h2>
    <p class="subtitle">Joining the classroom</p>
    <div class="error-msg" id="connect-error"></div>
  </div>
</div>

<!-- ── Screen 2: Name picker ──────────────────────────────────────────────── -->
<div id="name-screen" class="screen">
  <div class="card">
    <h2>Who's here?</h2>
    <p class="subtitle">Select everyone sharing this device, then tap <strong>Start</strong></p>
    <p class="selection-hint" id="selection-hint">No one selected</p>
    <div class="name-grid" id="name-grid"></div>
    <button class="btn btn-green" id="start-btn" style="width:100%;" disabled onclick="confirmIdentity()">
      Start →
    </button>
  </div>
</div>

<!-- ── Screen 3: Waiting ───────────────────────────────────────────────────── -->
<div id="waiting-screen" class="screen">
  <div class="student-badge" id="waiting-badge" onclick="resetIdentity()" title="Tap to change names">
    <span class="badge-dot"></span>
    <span id="waiting-badge-name"></span>
  </div>
  <button class="next-btn hidden" id="waiting-next-btn" onclick="cycleStudent()">
    Next Student ›
  </button>
  <div class="card">
    <div class="pulse-ring">🎵</div>
    <h2 id="waiting-title">Ready!</h2>
    <p class="subtitle" id="waiting-subtitle">Waiting for your teacher to send a task…</p>
  </div>
</div>

<!-- ── Screen 4: Module active ────────────────────────────────────────────── -->
<div id="module-screen" class="screen">
  <!-- Student badge and next-student button float over iframe -->
  <div class="student-badge" id="module-badge" onclick="resetIdentity()">
    <span class="badge-dot"></span>
    <span id="module-badge-name"></span>
  </div>
  <button class="next-btn hidden" id="module-next-btn" onclick="cycleStudentMidTask()">
    Next Student ›
  </button>
  <div id="practice-badge">🎵 Practice Mode</div>

  <iframe
    id="module-frame"
    sandbox="allow-scripts allow-same-origin allow-forms allow-fullscreen"
    allowfullscreen
  ></iframe>

  <!-- Task complete overlay (shown inside module screen after real submission) -->
  <div class="overlay" id="complete-overlay">
    <span class="checkmark">✅</span>
    <h2>Submitted!</h2>
    <p class="sub" id="complete-student-name"></p>
    <div class="overlay-btns">
      <button class="btn btn-green" id="next-student-btn" onclick="nextStudentAfterComplete()">
        Next Student ›
      </button>
      <button class="btn btn-purple" onclick="startPractice()">
        🎵 Practice
      </button>
    </div>
  </div>

  <!-- Practice complete overlay -->
  <div class="overlay" id="practice-overlay">
    <span class="checkmark">🎵</span>
    <h2>Nice work!</h2>
    <p class="sub">Practice complete</p>
    <div class="overlay-btns">
      <button class="btn btn-orange" onclick="startPractice()">
        Practice Again
      </button>
      <button class="btn btn-ghost" onclick="endPractice()">
        Done
      </button>
    </div>
  </div>
</div>

<script>
  // ─── Config ─────────────────────────────────────────────────────────────────
  const ROOM_ID    = 'mr-dangerous-music-mvp';
  const RETRY_DELAY = 4000;

  // ─── State ───────────────────────────────────────────────────────────────────
  let clientPeer    = null;
  let conn          = null;
  let roster        = [];             // [{student_id, name, displayName, grade}]
  let groupStudents = [];             // Students on this device (subset of roster)
  let activeIndex   = 0;             // Which group member is currently active
  let currentTask   = null;          // { taskId, taskQuestion, modulePath, savedSettings }
  let practiceMode  = false;

  // ─── Helpers ─────────────────────────────────────────────────────────────────
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id + '-screen').classList.add('active');
  }

  function setError(msg) {
    document.getElementById('connect-error').textContent = msg;
  }

  function activeStudent() {
    return groupStudents[activeIndex] || null;
  }

  function updateBadges() {
    const s = activeStudent();
    if (!s) return;
    const name = s.displayName || s.name.split(' ')[0];
    document.getElementById('waiting-badge-name').textContent  = name;
    document.getElementById('module-badge-name').textContent   = name;

    // Show "Next Student" button only when there are multiple group members
    const multi = groupStudents.length > 1;
    document.getElementById('waiting-next-btn').classList.toggle('hidden', !multi);
    document.getElementById('module-next-btn').classList.toggle('hidden', !multi);
    document.getElementById('next-student-btn').style.display = multi ? '' : 'none';
  }

  // ─── Connection ──────────────────────────────────────────────────────────────
  function connect() {
    if (clientPeer) { try { clientPeer.destroy(); } catch (_) {} clientPeer = null; }
    conn = null;
    showScreen('connecting');
    setError('');

    clientPeer = new Peer();

    clientPeer.on('open', () => {
      conn = clientPeer.connect(ROOM_ID, { reliable: true });

      conn.on('open',  ()     => setError(''));
      conn.on('data',  data   => handleHostMessage(data));
      conn.on('close', ()     => { setError('Disconnected. Reconnecting…'); setTimeout(connect, RETRY_DELAY); });
      conn.on('error', err   => setError('Connection error: ' + err.message));
    });

    clientPeer.on('error', err => {
      setError(err.type === 'peer-unavailable'
        ? 'Teacher hasn\'t opened the room yet. Retrying…'
        : 'Error (' + err.type + '). Retrying…');
      setTimeout(connect, RETRY_DELAY);
    });
  }

  // ─── Host messages ────────────────────────────────────────────────────────────
  function handleHostMessage(data) {
    if (data.type === 'roster') {
      roster = data.students;
      // Auto-re-identify on reconnect
      if (groupStudents.length > 0) {
        sendIdentify();
        showScreen('waiting');
        updateBadges();
      } else {
        renderNamePicker(roster);
        showScreen('name');
      }
    }

    else if (data.type === 'task') {
      currentTask  = data;
      practiceMode = false;
      loadModule(data.modulePath, data.savedSettings);
    }

    else if (data.type === 'task-clear') {
      currentTask = null;
      practiceMode = false;
      unloadModule();
      document.getElementById('waiting-subtitle').textContent = 'Task cleared — waiting for the next one…';
      showScreen('waiting');
      updateBadges();
    }
  }

  // ─── Name picker ─────────────────────────────────────────────────────────────
  function renderNamePicker(students) {
    const grid = document.getElementById('name-grid');
    grid.innerHTML = '';
    // Reset any previous group selection
    students.forEach(student => {
      const btn = document.createElement('button');
      btn.className  = 'name-btn';
      btn.textContent = student.displayName || student.name.split(' ')[0];
      btn.dataset.studentId = student.student_id;
      btn.onclick = () => toggleNameSelect(btn, student);
      grid.appendChild(btn);
    });
    updateSelectionHint();
  }

  function toggleNameSelect(btn, student) {
    const alreadySelected = groupStudents.some(s => s.student_id === student.student_id);
    if (alreadySelected) {
      groupStudents = groupStudents.filter(s => s.student_id !== student.student_id);
      btn.classList.remove('selected');
    } else {
      groupStudents.push(student);
      btn.classList.add('selected');
    }
    updateSelectionHint();
    document.getElementById('start-btn').disabled = groupStudents.length === 0;
  }

  function updateSelectionHint() {
    const n = groupStudents.length;
    const hint = document.getElementById('selection-hint');
    if (n === 0)      hint.textContent = 'No one selected';
    else if (n === 1) hint.textContent = `1 person selected`;
    else              hint.textContent = `${n} people selected — they'll take turns`;
  }

  function confirmIdentity() {
    if (groupStudents.length === 0) return;
    activeIndex = 0;
    sendIdentify();
    updateBadges();
    if (currentTask) {
      loadModule(currentTask.modulePath, currentTask.savedSettings);
    } else {
      document.getElementById('waiting-subtitle').textContent = 'Waiting for your teacher to send a task…';
      showScreen('waiting');
    }
  }

  function sendIdentify() {
    conn?.send({ type: 'identify', students: groupStudents });
  }

  function resetIdentity() {
    groupStudents = [];
    activeIndex   = 0;
    renderNamePicker(roster);
    showScreen('name');
  }

  // ─── Student cycling ─────────────────────────────────────────────────────────
  function cycleStudent() {
    // Cycle on waiting screen — just update badge
    activeIndex = (activeIndex + 1) % groupStudents.length;
    updateBadges();
  }

  function cycleStudentMidTask() {
    // Cycle while a module is showing — reload for the new active student
    activeIndex = (activeIndex + 1) % groupStudents.length;
    updateBadges();
    if (currentTask) loadModule(currentTask.modulePath, currentTask.savedSettings);
  }

  function nextStudentAfterComplete() {
    // Called from task-complete overlay — cycle and reload task for next student
    activeIndex = (activeIndex + 1) % groupStudents.length;
    hideOverlays();
    updateBadges();
    if (currentTask) loadModule(currentTask.modulePath, currentTask.savedSettings);
  }

  // ─── Module management ────────────────────────────────────────────────────────
  function loadModule(path, savedSettings) {
    hideOverlays();
    practiceMode = false;
    document.getElementById('practice-badge').classList.remove('visible');
    showScreen('module');
    updateBadges();

    const iframe = document.getElementById('module-frame');
    iframe.src = path;
    iframe.onload = () => {
      const s = activeStudent();
      setTimeout(() => {
        iframe.contentWindow.postMessage({
          type:         'taskmodule:init',
          context: {
            studentId:        s?.student_id || 'unknown',
            taskId:           currentTask?.taskId || '',
            grade:            s?.grade || '5',
            existingResponse: '',
            studentName:      s?.name || '',
          },
          savedSettings: savedSettings || null,
        }, '*');
      }, 100);
    };
  }

  function startPractice() {
    if (!currentTask) return;
    hideOverlays();
    practiceMode = true;
    document.getElementById('practice-badge').classList.add('visible');
    showScreen('module');
    updateBadges();

    const iframe = document.getElementById('module-frame');
    // Reload same module — randomises a new problem on init
    if (iframe.src && iframe.src !== 'about:blank') {
      // Force reload by toggling src
      const path = currentTask.modulePath;
      iframe.src = 'about:blank';
      requestAnimationFrame(() => {
        iframe.src = path;
        iframe.onload = () => {
          const s = activeStudent();
          setTimeout(() => {
            iframe.contentWindow.postMessage({
              type:    'taskmodule:init',
              context: {
                studentId:        s?.student_id || 'unknown',
                taskId:           currentTask?.taskId || '',
                grade:            s?.grade || '5',
                existingResponse: '',
                studentName:      s?.name || '',
              },
              savedSettings: currentTask.savedSettings || null,
            }, '*');
          }, 100);
        };
      });
    }
  }

  function endPractice() {
    practiceMode = false;
    hideOverlays();
    unloadModule();
    document.getElementById('waiting-subtitle').textContent =
      currentTask ? 'Task ready — pick who\'s up next' : 'Waiting for your teacher to send a task…';
    showScreen('waiting');
    updateBadges();
  }

  function unloadModule() {
    document.getElementById('module-frame').src = 'about:blank';
    document.getElementById('practice-badge').classList.remove('visible');
  }

  function hideOverlays() {
    document.getElementById('complete-overlay').classList.remove('active');
    document.getElementById('practice-overlay').classList.remove('active');
  }

  // ─── Module response relay ────────────────────────────────────────────────────
  window.addEventListener('message', event => {
    if (event.data.type !== 'taskmodule:response' || !event.data.isComplete) return;
    const s = activeStudent();
    if (!s || !conn) return;

    if (practiceMode) {
      // Practice: don't relay to host, show practice-complete overlay
      hideOverlays();
      document.getElementById('practice-overlay').classList.add('active');
    } else {
      // Real task: relay to host
      conn.send({
        type:       'response',
        student_id: s.student_id,
        taskId:     currentTask?.taskId || '',
        value:      event.data.value,
        isComplete: true,
      });
      // Show task-complete overlay
      const name = s.displayName || s.name.split(' ')[0];
      document.getElementById('complete-student-name').textContent = `${name}'s answer was sent ✓`;
      hideOverlays();
      document.getElementById('complete-overlay').classList.add('active');
    }
  });

  // ─── Start ───────────────────────────────────────────────────────────────────
  connect();
</script>
</body>
</html>
